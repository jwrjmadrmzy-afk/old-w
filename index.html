<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحر الكتابة | Old Wolf</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(-45deg, #1a0b2e, #4a154b, #12092f, #2b1055);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .lang-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
        }

        .lang-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .image-container {
            width: 280px;
            height: 280px;
            margin-bottom: 30px;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(138, 43, 226, 0.4);
            overflow: hidden;
            animation: float 6s ease-in-out infinite;
            position: relative;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .image-container:hover img {
            transform: scale(1.1);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn-main {
            padding: 12px 35px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            text-align: center;
            width: 250px;
        }

        .btn-main:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.5px;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <button class="lang-btn" id="lang-btn" onclick="toggleLanguage()">English</button>

    <div class="image-container">
        <img src="img.jpeg" alt="Artistic Awareness">
    </div>

    <div class="btn-group">
        <button class="btn-main" id="read-btn" onclick="readWelcome()">قراءة اصطناعية</button>
        <a href="g.html" class="btn-main" id="enter-btn">انتقل إلى كتابة جحيم الوعي</a>
        <a href="m.html" class="btn-main" id="child-btn">انتقل إلى كتابة عندما يشيخ الطفل</a>
    </div>

    <footer>
        <span id="copyright">هذا العمل الفني تابع لـ Old Wolf للبرمجيات التابعة للفنان جورج عماد رمزي</span>
    </footer>

    <script>
        let isArabic = true;

        function toggleLanguage() {
            isArabic = !isArabic;
            document.getElementById('html-root').dir = isArabic ? 'rtl' : 'ltr';
            
            if (isArabic) {
                document.getElementById('lang-btn').innerText = "English";
                document.getElementById('read-btn').innerText = "قراءة اصطناعية";
                document.getElementById('enter-btn').innerText = "انتقل إلى كتابة جحيم الوعي";
                document.getElementById('child-btn').innerText = "انتقل إلى كتابة عندما يشيخ الطفل";
                document.getElementById('copyright').innerText = "هذا العمل الفني تابع لـ Old Wolf للبرمجيات التابعة للفنان جورج عماد رمزي";
            } else {
                document.getElementById('lang-btn').innerText = "عربي";
                document.getElementById('read-btn').innerText = "Artificial Reading";
                document.getElementById('enter-btn').innerText = "Proceed to The Hell of Awareness";
                document.getElementById('child-btn').innerText = "Proceed to When the Child Ages";
                document.getElementById('copyright').innerText = "This artwork belongs to Old Wolf Software by Artist George Emad Ramzy";
            }
        }

        function readWelcome() {
            const textAr = "هذا العمل الفني تابع لأولد وولف للبرمجيات التابعة للفنان جورج عماد رمزي. انتقل إلى كتابة جحيم الوعي.";
            const textEn = "This artwork belongs to Old Wolf Software by Artist George Emad Ramzy. Proceed to The Hell of Awareness.";
            
            const utterance = new SpeechSynthesisUtterance(isArabic ? textAr : textEn);
            utterance.lang = isArabic ? 'ar-SA' : 'en-US';
            utterance.rate = 0.9; 
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
